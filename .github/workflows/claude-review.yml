name: Claude Review

on:
  pull_request:
    types: [opened, ready_for_review]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude code review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: anthropics/claude-code-action@b76a0776ae74036e77cd11018083743453d7ad35 # v1.0.179
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Perform a focused code review of the changes in this PR. You're a senior
            engineer reviewing for issues that matter — not a style checker.

            ruff, mypy, and pytest already run in CI, so do not comment on formatting,
            type annotations, import ordering, or anything a linter/formatter/test catches.
            Review only the lines changed in this PR; don't critique pre-existing code.

            Focus areas:
            1. Correctness - logic errors, edge cases, and races, especially in the
               streaming/turn state machine and the async reconnect handling.
            2. Security - API-key/auth handling and anything touching credentials or the
               HTTP/websocket flow.
            3. Public API & packaging - regressions in exported symbols, __version__,
               py.typed, or pyproject metadata that would affect published consumers.
            4. Tests - missing coverage or untested edge cases for new behavior.

            Before reporting an issue, verify it by reading the actual file — never guess
            line numbers or comment on files outside the diff. If you can't verify it,
            don't raise it. Every comment must include a concrete, actionable fix not just
            a description of the issue.

            Post inline comments on specific lines, each prefixed critical /
            suggestion / nit. Follow any conventions in CLAUDE.md. If the PR looks
            good, post a short 2-3 line approving summary and stop — don't invent
            nitpicks.
          claude_args: |
            --max-turns 10
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
